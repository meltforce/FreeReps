name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Create frontend stub for embed
        run: mkdir -p web/dist && touch web/dist/.gitkeep

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.1
          working-directory: server

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: server/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: server/web

      - name: Type check
        run: npx tsc --noEmit
        working-directory: server/web

      - name: Build
        run: npm run build
        working-directory: server/web
