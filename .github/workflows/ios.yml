name: iOS

on:
  push:
    branches: [main]
    paths:
      - "app/**"
  pull_request:
    paths:
      - "app/**"

jobs:
  build:
    runs-on: macos-15
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Build
        run: |
          xcodebuild build \
            -project FreeReps.xcodeproj \
            -scheme FreeReps \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty
